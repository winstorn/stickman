<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火柴人 | 霓虹格斗</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; cursor: pointer; }
  .hint {
    position: fixed; bottom: 40px;
    color: rgba(255,255,255,0.3); font-size: 13px;
    letter-spacing: 4px; text-transform: uppercase;
    transition: opacity 1s;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">点击切换动作</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpr = Math.min(window.devicePixelRatio || 1, 2);

let W, H, t = 0, actionIndex = 0;
const particles = [];
const trails = [];

/* ── Resize ── */
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ── Stick Figure ── */
const sf = {
  // root position (hip center), animated gently
  x: 0, y: 0,
  // joint angles (radians) — will be animated per action
  // body: spineLean, headLean
  // arms: shoulderL, elbowL, shoulderR, elbowR
  // legs: hipL, kneeL, hipR, kneeR
};

/* ── Action keyframes ──
   Each action is a set of joint angles that get interpolated over time.
   We define poses and cycle between them smoothly. */

// All angles in radians. 0 = straight down for legs, straight down for arms.
// Positive = clockwise
const poses = {
  // ─ idle ─
  idle: [
    { name:'neutral', spine:0, head:0, shL:-0.3, elL:0.2, shR:0.3, elR:-0.2, hipL:0.15, knL:0, hipR:-0.15, knR:0 },
    { name:'swayL',spine:0.05, head:0.02, shL:-0.35, elL:0.25, shR:0.25, elR:-0.15, hipL:0.1, knL:-0.05, hipR:-0.1, knR:0.05 },
    { name:'swayR',spine:-0.05, head:-0.02, shL:-0.25, elL:0.15, shR:0.35, elR:-0.25, hipL:0.15, knL:0.05, hipR:-0.15, knR:-0.05 },
  ],
  // ─ high kick ─
  kick: [
    { name:'ready', spine:0, head:0, shL:-0.5, elL:0.3, shR:0.5, elR:-0.3, hipL:0.3, knL:0.2, hipR:-0.2, knR:0 },
    { name:'chamber', spine:0.1, head:0.05, shL:-0.2, elL:0.5, shR:0.8, elR:-1.0, hipL:0.5, knL:1.2, hipR:-0.3, knR:0.1 },
    { name:'extend', spine:-0.15, head:-0.05, shL:0.3, elL:0.2, shR:-0.3, elR:0.1, hipL:1.3, knL:0.05, hipR:-0.4, knR:-0.1 },
    { name:'recoil', spine:0, head:0, shL:-0.5, elL:0.3, shR:0.5, elR:-0.3, hipL:0.3, knL:0.2, hipR:-0.2, knR:0 },
  ],
  // ─ spin kick ─
  spin: [
    { name:'crouch', spine:0.2, head:0.1, shL:-0.6, elL:0.8, shR:0.6, elR:-0.8, hipL:0.6, knL:0.8, hipR:-0.6, knR:0.8 },
    { name:'windup', spine:-0.1, head:-0.2, shL:0.8, elL:0.5, shR:-0.3, elR:0.1, hipL:0.3, knL:0.1, hipR:0.1, knR:0.5 },
    { name:'spinPeak', spine:-0.3, head:0, shL:1.2, elL:0.2, shR:-1.0, elR:0.6, hipL:1.0, knL:0, hipR:-0.5, knR:0.3 },
    { name:'land', spine:0, head:0, shL:-0.5, elL:0.5, shR:0.5, elR:-0.5, hipL:0.2, knL:0.3, hipR:-0.2, knR:0.3 },
  ],
  // ─ flip ─
  flip: [
    { name:'squat', spine:0.1, head:0, shL:-0.3, elL:0.1, shR:0.3, elR:-0.1, hipL:0.8, knL:1.3, hipR:-0.8, knR:1.3 },
    { name:'launch', spine:-0.6, head:-0.4, shL:0.5, elL:0.3, shR:0.5, elR:-0.3, hipL:0.3, knL:0.1, hipR:-0.3, knR:0.1 },
    { name:'tuck', spine:-1.5, head:-1.0, shL:0.2, elL:1.0, shR:0.2, elR:-1.0, hipL:1.5, knL:2.0, hipR:-1.5, knR:2.0 },
    { name:'extend', spine:0.15, head:0, shL:-0.4, elL:0.1, shR:0.4, elR:-0.1, hipL:0.1, knL:-0.2, hipR:-0.1, knR:-0.2 },
    { name:'land', spine:0.05, head:0, shL:-0.3, elL:0.1, shR:0.3, elR:-0.1, hipL:0.5, knL:0.8, hipR:-0.5, knR:0.8 },
  ],
  // ─ combo ─
  combo: [
    { name:'jab', spine:0.05, head:0, shL:-0.1, elL:0.1, shR:-1.5, elR:0.2, hipL:0.1, knL:0, hipR:-0.1, knR:0 },
    { name:'cross', spine:-0.1, head:0, shL:-1.5, elL:-0.2, shR:0.5, elR:-0.3, hipL:0.05, knL:0, hipR:-0.15, knR:0.1 },
    { name:'uppercut', spine:0.15, head:0.05, shL:0.3, elL:-1.2, shR:-0.3, elR:0.2, hipL:0.3, knL:0.4, hipR:-0.3, knR:0.4 },
    { name:'hook', spine:-0.1, head:0, shL:-0.5, elL:0.3, shR:-1.8, elR:1.5, hipL:0.2, knL:0.1, hipR:-0.2, knR:0.1 },
    { name:'recover', spine:0, head:0, shL:-0.3, elL:0.2, shR:0.3, elR:-0.2, hipL:0.15, knL:0, hipR:-0.15, knR:0 },
  ],
};

const actionNames = Object.keys(poses);
let currentAction = actionNames[0];
let currentPoseIdx = 0;
let poseProgress = 0; // 0..→ speed of transition between poses
let speedMultiplier = 1;

function lerpAngle(a, b, t) {
  // shortest-path interpolation for angles
  let diff = b - a;
  while (diff > Math.PI) diff -= 2 * Math.PI;
  while (diff < -Math.PI) diff += 2 * Math.PI;
  return a + diff * t;
}

function getJointAngles() {
  const seq = poses[currentAction];
  const curr = seq[currentPoseIdx];
  const next = seq[(currentPoseIdx + 1) % seq.length];
  const p = easeInOutCubic(poseProgress);

  return {
    spine: lerpAngle(curr.spine, next.spine, p),
    head:  lerpAngle(curr.head, next.head, p),
    shL:   lerpAngle(curr.shL, next.shL, p),
    elL:   lerpAngle(curr.elL, next.elL, p),
    shR:   lerpAngle(curr.shR, next.shR, p),
    elR:   lerpAngle(curr.elR, next.elR, p),
    hipL:  lerpAngle(curr.hipL, next.hipL, p),
    knL:   lerpAngle(curr.knL, next.knL, p),
    hipR:  lerpAngle(curr.hipR, next.hipR, p),
    knR:   lerpAngle(curr.knR, next.knR, p),
    poseName: curr.name,
  };
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

/* ── Compute joint positions ── */
const limbLen = { torso: 50, upperArm: 40, forearm: 35, upperLeg: 45, lowerLeg: 40, headR: 18 };

function getPositions() {
  const angles = getJointAngles();
  const cx = W / 2 + Math.sin(t * 0.3) * 5;
  const cy = H * 0.48 + Math.cos(t * 0.25) * 3;

  const neckX = cx + Math.sin(angles.spine) * limbLen.torso * 0.5;
  const neckY = cy - limbLen.torso * 0.5;
  const headX = neckX + Math.sin(angles.head) * 8;
  const headY = neckY - limbLen.headR;
  const hipX = cx;
  const hipY = cy + limbLen.torso * 0.3;

  // Left arm
  const shLX = neckX + Math.sin(angles.shL) * limbLen.upperArm;
  const shLY = neckY + Math.cos(angles.shL) * limbLen.upperArm;
  const elLX = shLX + Math.sin(angles.shL + angles.elL) * limbLen.forearm;
  const elLY = shLY + Math.cos(angles.shL + angles.elL) * limbLen.forearm;

  // Right arm
  const shRX = neckX + Math.sin(angles.shR) * limbLen.upperArm;
  const shRY = neckY + Math.cos(angles.shR) * limbLen.upperArm;
  const elRX = shRX + Math.sin(angles.shR + angles.elR) * limbLen.forearm;
  const elRY = shRY + Math.cos(angles.shR + angles.elR) * limbLen.forearm;

  // Left leg
  const hiLX = hipX + Math.sin(angles.hipL) * limbLen.upperLeg;
  const hiLY = hipY + Math.cos(angles.hipL) * limbLen.upperLeg;
  const knLX = hiLX + Math.sin(angles.hipL + angles.knL) * limbLen.lowerLeg;
  const knLY = hiLY + Math.cos(angles.hipL + angles.knL) * limbLen.lowerLeg;

  // Right leg
  const hiRX = hipX + Math.sin(angles.hipR) * limbLen.upperLeg;
  const hiRY = hipY + Math.cos(angles.hipR) * limbLen.upperLeg;
  const knRX = hiRX + Math.sin(angles.hipR + angles.knR) * limbLen.lowerLeg;
  const knRY = hiRY + Math.cos(angles.hipR + angles.knR) * limbLen.lowerLeg;

  return {
    head: { x: headX, y: headY },
    neck: { x: neckX, y: neckY },
    hip:  { x: hipX, y: hipY },
    shL:  { x: shLX, y: shLY },
    elL:  { x: elLX, y: elLY },
    shR:  { x: shRX, y: shRY },
    elR:  { x: elRX, y: elRY },
    hiL:  { x: hiLX, y: hiLY },
    knL:  { x: knLX, y: knLY },
    hiR:  { x: hiRX, y: hiRY },
    knR:  { x: knRX, y: knRY },
    angles,
  };
}

/* ── Glow drawing ── */
function drawGlowLine(x1, y1, x2, y2, color, width, glowSize, alpha) {
  // Outer glow
  const grad = ctx.createLinearGradient(x1, y1, x2, y2);
  grad.addColorStop(0, color.replace('1)', `${alpha * 0.2})`).replace('rgb', 'rgba'));
  grad.addColorStop(0.5, color.replace('1)', `${alpha * 0.6})`).replace('rgb', 'rgba'));
  grad.addColorStop(1, color.replace('1)', `${alpha * 0.2})`).replace('rgb', 'rgba'));

  ctx.strokeStyle = grad;
  ctx.lineWidth = width + glowSize;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  // Core
  const coreGrad = ctx.createLinearGradient(x1, y1, x2, y2);
  coreGrad.addColorStop(0, color.replace('1)', `${alpha * 0.7})`).replace('rgb', 'rgba'));
  coreGrad.addColorStop(0.5, color.replace('1)', `${alpha})`).replace('rgb', 'rgba'));
  coreGrad.addColorStop(1, color.replace('1)', `${alpha * 0.7})`).replace('rgb', 'rgba'));

  ctx.strokeStyle = coreGrad;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

/* ── Particles ── */
function spawnParticles(joint, intensity) {
  for (let i = 0; i < intensity; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 3;
    particles.push({
      x: joint.x, y: joint.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.015 + Math.random() * 0.04,
      size: 1 + Math.random() * 2,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life;
    ctx.fillStyle = `rgba(0, 255, 255, ${alpha})`;
    ctx.shadowColor = `rgba(0, 255, 255, ${alpha * 0.8})`;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

/* ── Trail segments ── */
const trailSegments = { elL: [], elR: [], knL: [], knR: [] };
const MAX_TRAIL = 15;

function updateTrails(pos) {
  for (const key of Object.keys(trailSegments)) {
    const seg = trailSegments[key];
    seg.push({ x: pos[key].x, y: pos[key].y, life: 1 });
    if (seg.length > MAX_TRAIL) seg.shift();
    for (const s of seg) s.life -= 0.08;
  }
}

function drawTrails() {
  for (const key of Object.keys(trailSegments)) {
    const seg = trailSegments[key];
    if (seg.length < 2) continue;
    for (let i = 1; i < seg.length; i++) {
      const s = seg[i];
      const alpha = s.life * 0.4;
      if (alpha <= 0) continue;
      ctx.strokeStyle = `rgba(255, 0, 128, ${alpha})`;
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(seg[i - 1].x, seg[i - 1].y);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
    }
  }
}

/* ── Background grid ── */
let gridOffset = 0;
function drawGrid() {
  gridOffset = (gridOffset + 0.15) % 80;
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  const spacing = 60;
  for (let x = gridOffset % spacing; x < W; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = gridOffset % spacing; y < H; y += spacing) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

/* ── Ground line ── */
function drawGround() {
  const gy = H * 0.48 + limbLen.torso * 0.3 + limbLen.upperLeg + limbLen.lowerLeg + 10;
  const grad = ctx.createLinearGradient(0, gy, 0, gy + 2);
  grad.addColorStop(0, 'rgba(0,255,255,0)');
  grad.addColorStop(0.4, 'rgba(0,255,255,0.4)');
  grad.addColorStop(0.6, 'rgba(0,255,255,0.4)');
  grad.addColorStop(1, 'rgba(0,255,255,0)');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, gy);
  ctx.lineTo(W, gy);
  ctx.stroke();
}

/* ── Main draw ── */
function drawStickman() {
  const pos = getPositions();
  updateTrails(pos);

  // Spawn particles on fast-moving joints
  const fastJoints = [pos.elL, pos.elR, pos.knL, pos.knR];
  if (poseProgress > 0.3 && poseProgress < 0.7 && Math.random() < 0.4) {
    const j = fastJoints[Math.floor(Math.random() * fastJoints.length)];
    spawnParticles(j, 1);
  }

  const alpha = 1;
  const colorCyan = 'rgb(0, 255, 255)';
  const colorMagenta = 'rgb(255, 0, 128)';
  const colorWhite = 'rgb(220, 220, 255)';

  // Body glow
  drawGlowLine(pos.hip.x, pos.hip.y, pos.neck.x, pos.neck.y, colorWhite, 2.5, 8, alpha);
  drawGlowLine(pos.neck.x, pos.neck.y, pos.shL.x, pos.shL.y, colorCyan, 2, 6, alpha);
  drawGlowLine(pos.shL.x, pos.shL.y, pos.elL.x, pos.elL.y, colorCyan, 2, 6, alpha);
  drawGlowLine(pos.neck.x, pos.neck.y, pos.shR.x, pos.shR.y, colorMagenta, 2, 6, alpha);
  drawGlowLine(pos.shR.x, pos.shR.y, pos.elR.x, pos.elR.y, colorMagenta, 2, 6, alpha);
  drawGlowLine(pos.hip.x, pos.hip.y, pos.hiL.x, pos.hiL.y, colorWhite, 2.5, 8, alpha);
  drawGlowLine(pos.hiL.x, pos.hiL.y, pos.knL.x, pos.knL.y, colorWhite, 2.5, 8, alpha);
  drawGlowLine(pos.hip.x, pos.hip.y, pos.hiR.x, pos.hiR.y, colorWhite, 2.5, 8, alpha);
  drawGlowLine(pos.hiR.x, pos.hiR.y, pos.knR.x, pos.knR.y, colorWhite, 2.5, 8, alpha);

  // Head halo
  ctx.beginPath();
  ctx.arc(pos.head.x, pos.head.y, limbLen.headR, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,1)';
  ctx.fill();
  ctx.strokeStyle = 'rgb(0, 255, 255)';
  ctx.lineWidth = 1.8;
  ctx.shadowColor = 'rgb(0, 255, 255)';
  ctx.shadowBlur = 20;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Joint dots
  const joints = [pos.neck, pos.shL, pos.elL, pos.shR, pos.elR, pos.hip, pos.hiL, pos.knL, pos.hiR, pos.knR];
  for (const j of joints) {
    ctx.beginPath();
    ctx.arc(j.x, j.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgb(255, 255, 255)';
    ctx.shadowColor = 'rgb(0, 255, 255)';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

/* ── Action label ── */
function drawLabel() {
  const pose = poses[currentAction][currentPoseIdx];
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.font = '11px "Courier New", monospace';
  ctx.letterSpacing = '4px';
  ctx.textAlign = 'center';
  ctx.fillText(currentAction.toUpperCase() + ' / ' + pose.name.toUpperCase(), W / 2, H * 0.82);
}

/* ── Vignette ── */
function drawVignette() {
  const grad = ctx.createRadialGradient(W/2, H*0.45, Math.min(W,H)*0.2, W/2, H*0.45, Math.max(W,H)*0.8);
  grad.addColorStop(0, 'rgba(10,10,15,0)');
  grad.addColorStop(1, 'rgba(10,10,15,0.7)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

/* ── Loop ── */
function animate() {
  ctx.clearRect(0, 0, W, H);

  // Update pose progress
  poseProgress += 0.012 * speedMultiplier;
  if (poseProgress >= 1) {
    poseProgress = 0;
    currentPoseIdx = (currentPoseIdx + 1) % poses[currentAction].length;
  }

  t += 0.016;

  drawGrid();
  drawGround();
  drawTrails();
  drawParticles();
  drawStickman();
  updateParticles();
  drawVignette();
  drawLabel();

  requestAnimationFrame(animate);
}

/* ── Click to switch action ── */
canvas.addEventListener('click', () => {
  actionIndex = (actionIndex + 1) % actionNames.length;
  currentAction = actionNames[actionIndex];
  currentPoseIdx = 0;
  poseProgress = 0;
  // Burst particles on switch
  const pos = getPositions();
  for (const j of Object.values(pos)) {
    if (j && j.x) spawnParticles(j, 3);
  }
});

/* ── Keyboard ── */
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') {
    actionIndex = (actionIndex + 1) % actionNames.length;
    currentAction = actionNames[actionIndex];
    currentPoseIdx = 0;
    poseProgress = 0;
  } else if (e.key === 'ArrowLeft') {
    actionIndex = (actionIndex - 1 + actionNames.length) % actionNames.length;
    currentAction = actionNames[actionIndex];
    currentPoseIdx = 0;
    poseProgress = 0;
  } else if (e.key === ' ') {
    speedMultiplier = speedMultiplier === 1 ? 0.2 : speedMultiplier === 0.2 ? 2.5 : 1;
    e.preventDefault();
  }
});

animate();
</script>
</body>
</html>
