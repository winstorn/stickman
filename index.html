<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火柴人 | 霓虹格斗</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06060b;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'Courier New', monospace;
    user-select: none; -webkit-user-select: none;
  }
  canvas { display: block; cursor: pointer; }
  .hint {
    position: fixed; bottom: 48px;
    color: rgba(255,255,255,0.35); font-size: 14px;
    letter-spacing: 3px; text-transform: uppercase;
    pointer-events: none; transition: opacity 0.6s;
    text-align: center;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint" id="hint">🖱 点击开始对戦</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpr = Math.min(window.devicePixelRatio || 1, 2);
const hint = document.getElementById('hint');

let W, H, t = 0;
const particles = [];
const impacts = []; // hit flash effects
let shakeAmount = 0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();

/* ── Helpers ── */
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpAngle(a, b, t) {
  let d = b - a;
  while (d > Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return a + d * t;
}
function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

/* ── Limb lengths ── */
const LL = { torso: 48, upArm: 38, foreArm: 34, upLeg: 44, loLeg: 38, headR: 17 };

/* ═══════════════════════════════════════════
   FIGHTER
   ═══════════════════════════════════════════ */
class Fighter {
  constructor(baseX, baseY, color, facingRight) {
    this.bx = baseX;
    this.by = baseY;
    this.color = color;     // 'rgb(r,g,b)'
    this.facingRight = facingRight;
    this.flip = facingRight ? 1 : -1; // mirror for facing direction

    // Current interpolated angles
    this.angles = this._defaultPose();
    this.targetAngles = this._defaultPose();
    this.prevAngles = this._defaultPose();
    this.transition = 0;

    // Position offset (for jumps, knockback, knockdown)
    this.offsetX = 0;
    this.offsetY = 0;
    this.targetOffX = 0;
    this.targetOffY = 0;
    this.prevOffX = 0;
    this.prevOffY = 0;

    // Visual
    this.alpha = 1;
    this.targetAlpha = 1;
  }

  _defaultPose() {
    return { spine:0, head:0, shL:-0.3, elL:0.2, shR:0.3, elR:-0.2, hipL:0.12, knL:0, hipR:-0.12, knR:0 };
  }

  setPose(pose, durationFrames) {
    // durationFrames: how many frames to transition
    // If 0 or omitted, snap immediately
    this.prevAngles = { ...this.angles };
    this.targetAngles = { ...pose };
    this.transition = 0;
    this.transitionSpeed = durationFrames > 0 ? 1 / durationFrames : 1;
  }

  setOffset(x, y, durationFrames) {
    this.prevOffX = this.offsetX;
    this.prevOffY = this.offsetY;
    this.targetOffX = x;
    this.targetOffY = y;
    this.offTransition = 0;
    this.offSpeed = durationFrames > 0 ? 1 / durationFrames : 1;
  }

  update() {
    if (this.transition < 1) {
      this.transition = Math.min(1, this.transition + this.transitionSpeed);
      const p = ease(this.transition);
      for (const k of Object.keys(this.targetAngles)) {
        this.angles[k] = lerpAngle(this.prevAngles[k], this.targetAngles[k], p);
      }
    }
    if (this.offTransition !== undefined && this.offTransition < 1) {
      this.offTransition = Math.min(1, this.offTransition + this.offSpeed);
      const p = ease(this.offTransition);
      this.offsetX = lerp(this.prevOffX, this.targetOffX, p);
      this.offsetY = lerp(this.prevOffY, this.targetOffY, p);
    }
  }

  getPositions() {
    const a = this.angles;
    const cx = this.bx + this.offsetX;
    const cy = this.by + this.offsetY;
    const f = this.flip;

    const neckX = cx + Math.sin(a.spine) * LL.torso * 0.5 * f;
    const neckY = cy - LL.torso * 0.5;
    const headX = neckX + Math.sin(a.head) * 6;
    const headY = neckY - LL.headR;
    const hipX = cx;
    const hipY = cy + LL.torso * 0.25;

    // Arms (shoulder → elbow → hand)
    const shLX = neckX + Math.sin(a.shL * f) * LL.upArm * f;
    const shLY = neckY + Math.cos(a.shL * f) * LL.upArm;
    const elLX = shLX + Math.sin((a.shL + a.elL) * f) * LL.foreArm * f;
    const elLY = shLY + Math.cos((a.shL + a.elL) * f) * LL.foreArm;

    const shRX = neckX + Math.sin(a.shR * f) * LL.upArm * f;
    const shRY = neckY + Math.cos(a.shR * f) * LL.upArm;
    const elRX = shRX + Math.sin((a.shR + a.elR) * f) * LL.foreArm * f;
    const elRY = shRY + Math.cos((a.shR + a.elR) * f) * LL.foreArm;

    // Legs
    const hiLX = hipX + Math.sin(a.hipL * f) * LL.upLeg * f;
    const hiLY = hipY + Math.cos(a.hipL * f) * LL.upLeg;
    const knLX = hiLX + Math.sin((a.hipL + a.knL) * f) * LL.loLeg * f;
    const knLY = hiLY + Math.cos((a.hipL + a.knL) * f) * LL.loLeg;

    const hiRX = hipX + Math.sin(a.hipR * f) * LL.upLeg * f;
    const hiRY = hipY + Math.cos(a.hipR * f) * LL.upLeg;
    const knRX = hiRX + Math.sin((a.hipR + a.knR) * f) * LL.loLeg * f;
    const knRY = hiRY + Math.cos((a.hipR + a.knR) * f) * LL.loLeg;

    return {
      head:{x:headX,y:headY}, neck:{x:neckX,y:neckY}, hip:{x:hipX,y:hipY},
      shL:{x:shLX,y:shLY}, elL:{x:elLX,y:elLY},
      shR:{x:shRX,y:shRY}, elR:{x:elRX,y:elRY},
      hiL:{x:hiLX,y:hiLY}, knL:{x:knLX,y:knLY},
      hiR:{x:hiRX,y:hiRY}, knR:{x:knRX,y:knRY},
      // "front" facing limbs point toward opponent
      frontHand: this.facingRight ? {x:elRX,y:elRY} : {x:elLX,y:elLY},
      frontFoot: this.facingRight ? {x:knRX,y:knRY} : {x:knLX,y:knLY},
      backHand: this.facingRight ? {x:elLX,y:elLY} : {x:elRX,y:elRY},
      backFoot: this.facingRight ? {x:knLX,y:knLY} : {x:knRX,y:knRY},
      chest: {x:neckX,y:cy - LL.torso * 0.15},
    };
  }

  draw(ctx) {
    if (this.alpha <= 0) return;
    const p = this.getPositions();
    const a = this.alpha;
    const c = this.color;

    const segments = [
      [p.hip, p.neck, 2.2, 7],
      [p.neck, p.shL, 1.8, 5],
      [p.shL, p.elL, 1.8, 5],
      [p.neck, p.shR, 1.8, 5],
      [p.shR, p.elR, 1.8, 5],
      [p.hip, p.hiL, 2.2, 7],
      [p.hiL, p.knL, 2.2, 7],
      [p.hip, p.hiR, 2.2, 7],
      [p.hiR, p.knR, 2.2, 7],
    ];

    for (const [f, t, w, g] of segments) {
      this._glowLine(ctx, f.x, f.y, t.x, t.y, c, w, g, a);
    }

    // Head
    ctx.beginPath();
    ctx.arc(p.head.x, p.head.y, LL.headR, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.fill();
    ctx.strokeStyle = c.replace('rgb', 'rgba').replace(')', `,${a})`);
    ctx.lineWidth = 1.6;
    ctx.shadowColor = c.replace('rgb', 'rgba').replace(')', `,${a})`);
    ctx.shadowBlur = 16;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Joint dots
    const joints = [p.neck, p.shL, p.elL, p.shR, p.elR, p.hip, p.hiL, p.knL, p.hiR, p.knR];
    for (const j of joints) {
      ctx.beginPath();
      ctx.arc(j.x, j.y, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.shadowColor = c.replace('rgb', 'rgba').replace(')', `,${0.6 * a})`);
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  _glowLine(ctx, x1, y1, x2, y2, color, w, glow, alpha) {
    const c1 = color.replace('rgb', 'rgba').replace(')', `,${alpha * 0.15})`);
    const c2 = color.replace('rgb', 'rgba').replace(')', `,${alpha * 0.5})`);
    const c3 = color.replace('rgb', 'rgba').replace(')', `,${alpha * 0.7})`);
    const c4 = color.replace('rgb', 'rgba').replace(')', `,${alpha})`);

    const g1 = ctx.createLinearGradient(x1, y1, x2, y2);
    g1.addColorStop(0, c1); g1.addColorStop(0.5, c2); g1.addColorStop(1, c1);
    ctx.strokeStyle = g1;
    ctx.lineWidth = w + glow;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

    const g2 = ctx.createLinearGradient(x1, y1, x2, y2);
    g2.addColorStop(0, c3); g2.addColorStop(0.5, c4); g2.addColorStop(1, c3);
    ctx.strokeStyle = g2;
    ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }
}

/* ═══════════════════════════════════════════
   FIGHT CHOREOGRAPHY
   ═══════════════════════════════════════════ */

// Pose templates (angles in radians)
// For fighters facing each other: positive shR = arm extending forward (toward opponent)

const P = {
  // ── Idle ──
  idle: { spine:0, head:0, shL:-0.3, elL:0.2, shR:0.3, elR:-0.2, hipL:0.12, knL:0, hipR:-0.12, knR:0 },
  idleWide: { spine:0, head:0, shL:-0.4, elL:0.3, shR:0.4, elR:-0.3, hipL:0.2, knL:0, hipR:-0.2, knR:0 },

  // ── Punches (front hand extends forward) ──
  jab:     { spine:0.1, head:0, shL:-0.2, elL:0.2, shR:-1.4, elR:0.15, hipL:0.1, knL:0, hipR:-0.15, knR:0.05 },
  cross:   { spine:-0.15, head:0, shL:-1.5, elL:-0.2, shR:0.4, elR:-0.3, hipL:0.05, knL:0, hipR:-0.2, knR:0.1 },
  uppercut:{ spine:0.2, head:0.05, shL:0.4, elL:-1.2, shR:-0.3, elR:0.2, hipL:0.35, knL:0.4, hipR:-0.35, knR:0.4 },

  // ── Kicks ──
  frontKick:   { spine:-0.1, head:0, shL:0.4, elL:0.3, shR:-0.3, elR:0.1, hipL:1.2, knL:0.05, hipR:-0.4, knR:-0.1 },
  roundKick:   { spine:-0.25, head:-0.1, shL:0.6, elL:0.4, shR:-0.8, elR:0.6, hipL:1.4, knL:0.2, hipR:-0.2, knR:-0.1 },
  spinKick:    { spine:-0.35, head:0, shL:1.3, elL:0.2, shR:-1.0, elR:0.5, hipL:0.9, knL:0, hipR:-0.6, knR:0.3 },

  // ── Defensive ──
  dodgeBack:  { spine:-0.2, head:-0.1, shL:-0.6, elL:0.7, shR:0.6, elR:-0.7, hipL:0.15, knL:0.1, hipR:-0.1, knR:-0.05 },
  duck:       { spine:0.3, head:0.15, shL:-0.7, elL:0.9, shR:0.7, elR:-0.9, hipL:0.7, knL:0.9, hipR:-0.7, knR:0.9 },
  block:      { spine:0.05, head:-0.05, shL:-0.9, elL:0.2, shR:-0.9, elR:0.2, hipL:0.2, knL:0.1, hipR:-0.2, knR:0.1 },

  // ── Hit reactions ──
  hitStagger: { spine:-0.15, head:-0.1, shL:0.1, elL:0.1, shR:0.3, elR:-0.1, hipL:0.1, knL:-0.1, hipR:-0.05, knR:0 },
  hitHard:    { spine:-0.3, head:-0.2, shL:0.3, elL:0.1, shR:0.1, elR:-0.3, hipL:0.05, knL:-0.15, hipR:0, knR:0.1 },
  knockback:  { spine:-0.4, head:-0.3, shL:0.5, elL:0.4, shR:-0.2, elR:-0.2, hipL:-0.3, knL:-0.4, hipR:0.3, knR:-0.1 },
  fallen:     { spine:-0.5, head:-0.6, shL:0.8, elL:1.5, shR:-0.8, elR:-1.5, hipL:-0.1, knL:-1.2, hipR:-1.0, knR:0.4 },
  getUp:      { spine:0.1, head:0, shL:-0.2, elL:0.6, shR:0.2, elR:-0.6, hipL:0.4, knL:0.5, hipR:-0.4, knR:0.5 },

  // ── Victory ──
  victory:    { spine:0.1, head:0, shL:-1.3, elL:-1.5, shR:-1.3, elR:-1.5, hipL:0.2, knL:0, hipR:-0.2, knR:0 },
};

// ── Fight beats ──
// Each beat: [timeSeconds, aPose, aOffX, aOffY, bPose, bOffX, bOffY, hitResult]
// hitResult: null | { target:'a'|'b', power:0-1, atJoint: bool }
// time is cumulative (seconds from fight start), not delta

const fightSequence = [
  // Staredown
  [0.0,  'idle',    0,0,  'idle',    0,0, null],
  [1.0,  'idleWide',0,0,  'idleWide',0,0, null],

  // A throws jab → B dodges
  [1.8,  'jab',     15,0, 'dodgeBack',-10,0, null],

  // A throws cross → B dodges again
  [2.6,  'cross',   10,0, 'dodgeBack',-15,0, null],

  // B counters with round kick → HITS A
  [3.2,  'hitHard', -20,0, 'roundKick',15,0, { target:'a', power:0.6 }],

  // A staggers, B presses with front kick
  [3.8,  'hitStagger',-25,0, 'frontKick',20,0, { target:'a', power:0.5 }],

  // A ducks under B's spin kick
  [4.6,  'duck',    0,0,  'spinKick', 10,0, null],

  // A counters with uppercut → HITS B hard
  [5.2,  'uppercut',10,0, 'hitHard', -20,0, { target:'b', power:0.8 }],

  // A follows with jab-cross combo
  [5.8,  'jab',     15,0, 'hitStagger',-25,0, { target:'b', power:0.3 }],
  [6.3,  'cross',   15,0, 'hitHard', -30,0, { target:'b', power:0.4 }],

  // A finishes with round kick → B goes flying
  [7.0,  'roundKick',20,0, 'knockback',-50,0, { target:'b', power:1.0 }],

  // B falls down
  [7.6,  'idleWide',0,0,  'fallen', -55, 15, null],

  // A victory pose
  [8.5,  'victory', 0,-5, 'fallen', -55, 15, null],
];

let fightTime = -1;      // -1 = waiting for click, >=0 = fight in progress
let beatIndex = 0;
let fightEnded = false;
let fightCooldown = 0;   // cooldown before next fight

/* ═══════════════════════════════════════════
   INIT FIGHTERS
   ═══════════════════════════════════════════ */
let fighterA, fighterB;

function initFighters() {
  const midX = W / 2;
  const baseY = H * 0.45;
  fighterA = new Fighter(midX - 80, baseY, 'rgb(0, 255, 255)', true);   // cyan, faces right
  fighterB = new Fighter(midX + 80, baseY, 'rgb(255, 50, 150)', false); // magenta, faces left
  applyFightBeat(0); // Set initial idle pose
}
initFighters();

function applyFightBeat(idx) {
  if (idx >= fightSequence.length) return;
  const [time, aPose, aOx, aOy, bPose, bOx, bOy, hit] = fightSequence[idx];
  const dur = 8; // frames for transition

  fighterA.setPose(P[aPose] || P.idle, dur);
  fighterA.setOffset(aOx, aOy, dur);
  fighterB.setPose(P[bPose] || P.idle, dur);
  fighterB.setOffset(bOx, bOy, dur);

  if (hit) {
    const target = hit.target === 'a' ? fighterA : fighterB;
    const attacker = hit.target === 'a' ? fighterB : fighterA;
    const tPos = target.getPositions();
    const atPos = attacker.getPositions();

    // Impact point: where the attacking limb meets the target body
    const impactPt = { x: tPos.chest.x, y: tPos.chest.y };

    spawnHitSparks(impactPt, hit.power);
    impacts.push({ x: impactPt.x, y: impactPt.y, life: 1, power: hit.power });
    shakeAmount = Math.max(shakeAmount, hit.power * 12);

    if (hit.power >= 0.8) {
      // Screen flash
      impacts.push({ x: W / 2, y: H / 2, life: 1, power: hit.power, screen: true });
    }
  }
}

/* ── Hit sparks ── */
function spawnHitSparks(pt, power) {
  const count = Math.floor(10 + power * 30);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 8 * power;
    particles.push({
      x: pt.x, y: pt.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.06,
      size: 1 + Math.random() * 3 * power,
      color: Math.random() < 0.3 ? 'rgb(255,255,255)' : 'rgb(255,200,50)',
    });
  }
}

/* ── Impact flash ── */
function drawImpacts() {
  for (let i = impacts.length - 1; i >= 0; i--) {
    const imp = impacts[i];
    imp.life -= 0.04;
    if (imp.life <= 0) { impacts.splice(i, 1); continue; }

    if (imp.screen) {
      // Full screen flash
      ctx.fillStyle = `rgba(255,255,255,${imp.life * 0.15})`;
      ctx.fillRect(0, 0, W, H);
    } else {
      // Local impact ring
      const r = (1 - imp.life) * 60 * imp.power + 5;
      const alpha = imp.life * 0.6;
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(imp.x, imp.y, r, 0, Math.PI * 2);
      ctx.stroke();

      // Inner glow
      const g = ctx.createRadialGradient(imp.x, imp.y, 0, imp.x, imp.y, r);
      g.addColorStop(0, `rgba(255,255,200,${alpha})`);
      g.addColorStop(1, 'rgba(255,200,50,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(imp.x, imp.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

/* ═══════════════════════════════════════════
   PARTICLES
   ═══════════════════════════════════════════ */
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05; // gravity
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life;
    ctx.fillStyle = p.color.replace('rgb', 'rgba').replace(')', `,${alpha})`);
    ctx.shadowColor = p.color.replace('rgb', 'rgba').replace(')', `,${alpha * 0.8})`);
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

/* ═══════════════════════════════════════════
   BACKGROUND
   ═══════════════════════════════════════════ */
let gridOffset = 0;
function drawBackground() {
  gridOffset = (gridOffset + 0.1) % 80;

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 0.5;
  const sp = 60;
  for (let x = gridOffset % sp; x < W; x += sp) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = gridOffset % sp; y < H; y += sp) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Ground
  const gy = H * 0.45 + LL.torso * 0.25 + LL.upLeg + LL.loLeg + 8;
  const g = ctx.createLinearGradient(0, gy, 0, gy + 3);
  g.addColorStop(0, 'rgba(255,255,255,0)');
  g.addColorStop(0.5, 'rgba(255,255,255,0.08)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.strokeStyle = g;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W * 0.05, gy);
  ctx.lineTo(W * 0.95, gy);
  ctx.stroke();
}

/* ── Vignette ── */
function drawVignette() {
  const g = ctx.createRadialGradient(W/2, H*0.4, Math.min(W,H)*0.25, W/2, H*0.4, Math.max(W,H)*0.8);
  g.addColorStop(0, 'rgba(6,6,11,0)');
  g.addColorStop(1, 'rgba(6,6,11,0.75)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

/* ── VS indicator ── */
function drawVS() {
  const midX = W / 2;
  const midY = H * 0.45;
  const pulse = 1 + Math.sin(t * 3) * 0.15;

  ctx.save();
  ctx.translate(midX, midY - 10);
  ctx.scale(pulse, pulse);

  // VS circle
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = 'bold 18px "Courier New"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('VS', 0, 1);

  ctx.restore();
}

/* ═══════════════════════════════════════════
   MAIN LOOP
   ═══════════════════════════════════════════ */
function animate() {
  ctx.clearRect(0, 0, W, H);
  t += 0.016;

  // Update fight timeline
  if (fightTime >= 0 && !fightEnded) {
    fightTime += 0.016;

    // Check if we should advance to next beat
    if (beatIndex + 1 < fightSequence.length) {
      const nextBeatTime = fightSequence[beatIndex + 1][0];
      if (fightTime >= nextBeatTime) {
        beatIndex++;
        applyFightBeat(beatIndex);
      }
    }

    // Check if fight ended
    if (beatIndex >= fightSequence.length - 1 && fightTime > fightSequence[fightSequence.length - 1][0] + 2) {
      fightEnded = true;
      fightCooldown = 1.5;
      hint.style.opacity = '1';
      hint.textContent = '🖱 点击再来一局';
    }
  }

  // Cooldown after fight ends
  if (fightCooldown > 0) {
    fightCooldown -= 0.016;
  }

  // Shake decay
  if (shakeAmount > 0) shakeAmount *= 0.85;
  if (shakeAmount < 0.1) shakeAmount = 0;
  const sx = (Math.random() - 0.5) * shakeAmount * 2;
  const sy = (Math.random() - 0.5) * shakeAmount * 2;

  ctx.save();
  ctx.translate(sx, sy);

  // Update fighters
  fighterA.update();
  fighterB.update();

  // Spawn ambient particles for fighter limbs during fight
  if (fightTime >= 0 && !fightEnded) {
    for (const f of [fighterA, fighterB]) {
      const p = f.getPositions();
      const fast = [p.frontHand, p.frontFoot, p.backHand, p.backFoot];
      const j = fast[Math.floor(Math.random() * fast.length)];
      if (Math.random() < 0.3) {
        particles.push({
          x: j.x, y: j.y,
          vx: (Math.random() - 0.5) * 1.5,
          vy: (Math.random() - 0.5) * 1.5,
          life: 1, decay: 0.03 + Math.random() * 0.05,
          size: 1 + Math.random() * 1.5,
          color: f.color,
        });
      }
    }
  }

  drawBackground();
  fighterA.draw(ctx);
  fighterB.draw(ctx);
  drawImpacts();
  drawParticles();
  drawVS();
  drawVignette();

  updateParticles();
  ctx.restore();

  requestAnimationFrame(animate);
}

/* ═══════════════════════════════════════════
   INTERACTION
   ═══════════════════════════════════════════ */
function startFight() {
  if (fightTime >= 0 && !fightEnded) return; // already fighting
  if (fightCooldown > 0) return;

  // Reset
  particles.length = 0;
  impacts.length = 0;
  shakeAmount = 0;
  fightTime = 0;
  beatIndex = 0;
  fightEnded = false;

  // Re-init fighters at current positions
  initFighters();

  hint.style.opacity = '0';

  // Small delay before first beat
  applyFightBeat(0);
}

canvas.addEventListener('click', startFight);
window.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    startFight();
  }
});

// Handle window resize for fighter positions
window.addEventListener('resize', () => {
  resize();
  if (fightTime < 0 || fightEnded) {
    initFighters();
  }
});

animate();
</script>
</body>
